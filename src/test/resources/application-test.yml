spring:
  datasource:
    url: "jdbc:h2:mem:davocado;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS TEXT"
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
jwt:
  secret: "test-jwt-secret-key-with-at-least-32-bytes-length-1234567890"
  access-token-validity-seconds: 1209600
