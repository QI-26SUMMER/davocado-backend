# Render Blueprint — deploys the Spring Boot backend as a Docker web service.
# Import via Render Dashboard → "New +" → "Blueprint", pointing at this repo.
#
# The PostgreSQL database already exists (created in the dashboard), so it is
# referenced through environment variables rather than declared here. The web
# service and DB must share the same region (oregon) so the fast internal
# hostname works without SSL.
services:
  - type: web
    name: davocado-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Disable the local-dev profile (show-sql, verbose logging) in production.
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # No migration tooling yet — let Hibernate create/update the schema.
      # Switch to `validate` once Flyway/Liquibase migrations are introduced.
      - key: JPA_DDL_AUTO
        value: update
      # Internal JDBC URL (host = DB's internal name, no region suffix, no SSL).
      - key: DB_URL
        value: jdbc:postgresql://dpg-d9bbvmojs32c739qaj10-a/d_avocado_db
      - key: DB_USERNAME
        value: d_avocado_db_user
      # Secrets — entered in the dashboard on first sync, never committed.
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
